<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Connexa</title>
  <!-- TASK-005: Frontend de cadastro para consumir o endpoint /api/usuarios/cadastro -->
  <style>
    :root {
      --primary: #007bff;
      --background: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --danger: #dc3545;
      --success: #198754;
      --border: #d1d5db;
      --radius: 0.75rem;
      font-family: Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: min(520px, 100%);
      background: var(--background);
      border: 1px solid rgba(0, 123, 255, 0.12);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      color: var(--primary);
      font-size: clamp(1.8rem, 2.5vw, 2.4rem);
    }

    p.lead {
      margin: 0 0 1.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.12);
    }

    .hint {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .error-text {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--danger);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 0.9rem;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--primary);
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
    }

    button:hover:not(:disabled) {
      background: #0056d6;
      transform: translateY(-1px);
    }

    .status-box {
      margin-top: 1rem;
      border-radius: 0.75rem;
      padding: 1rem 1.1rem;
      font-size: 0.98rem;
      display: none;
    }

    .status-box.active {
      display: block;
    }

    .status-box.success {
      background: rgba(25, 135, 84, 0.12);
      border: 1px solid rgba(25, 135, 84, 0.2);
      color: var(--success);
    }

    .status-box.error {
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.22);
      color: var(--danger);
    }

    .sending {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 1.25rem;
      }

      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="titulo-cadastro">
    <h1 id="titulo-cadastro">Cadastro Connexa</h1>
    <p class="lead">Registre-se com seu email institucional para acessar grupos de estudo.</p>

    <form id="cadastro-form" novalidate>
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" autocomplete="name" required aria-describedby="nome-help nome-error" />
        <p class="hint" id="nome-help">Informe seu nome completo.</p>
        <p class="error-text" id="nome-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="email">Email institucional</label>
        <input id="email" name="email" type="email" autocomplete="email" required aria-describedby="email-help email-error" />
        <p class="hint" id="email-help">Use um email do domínio <strong>@universidade.edu.br</strong>.</p>
        <p class="error-text" id="email-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" autocomplete="new-password" required aria-describedby="senha-help senha-error" />
        <p class="hint" id="senha-help">Pelo menos 8 caracteres, incluindo maiúscula, minúscula e número.</p>
        <p class="error-text" id="senha-error" aria-live="polite"></p>
      </div>

      <button id="submit-button" type="submit">Cadastrar</button>
      <div id="status" class="status-box" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    // TASK-005: Formulário frontend que consome POST /api/usuarios/cadastro
    const API_URL = '/api/usuarios/cadastro';

    const form = document.getElementById('cadastro-form');
    const nomeInput = document.getElementById('nome');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');
    const submitButton = document.getElementById('submit-button');
    const statusBox = document.getElementById('status');

    const fields = {
      nome: {
        input: nomeInput,
        error: document.getElementById('nome-error'),
        validate: value => value.trim().length >= 3,
        message: 'Informe seu nome completo (mínimo 3 caracteres).',
      },
      email: {
        input: emailInput,
        error: document.getElementById('email-error'),
        validate: value => /^\S+@\S+\.\S+$/.test(value) && value.toLowerCase().endsWith('@universidade.edu.br'),
        message: 'Use um email válido do domínio @universidade.edu.br.',
      },
      senha: {
        input: senhaInput,
        error: document.getElementById('senha-error'),
        validate: value => /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(value),
        message: 'Senha fraca: precisa ter 8+ caracteres, maiúscula, minúscula e número.',
      },
    };

    function validarCampo(nomeCampo) {
      const field = fields[nomeCampo];
      const value = field.input.value;
      const valido = field.validate(value);
      field.error.textContent = valido ? '' : field.message;
      field.input.setAttribute('aria-invalid', !valido);
      return valido;
    }

    Object.keys(fields).forEach(key => {
      const field = fields[key];
      field.input.addEventListener('input', () => validarCampo(key));
    });

    function exibirStatus(tipo, mensagem) {
      statusBox.className = `status-box active ${tipo}`;
      statusBox.textContent = mensagem;
    }

    function limparStatus() {
      statusBox.className = 'status-box';
      statusBox.textContent = '';
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      limparStatus();

      const todosValidos = Object.keys(fields).every(validarCampo);
      if (!todosValidos) {
        exibirStatus('error', 'Por favor, corrija os campos antes de enviar.');
        return;
      }

      submitButton.disabled = true;
      submitButton.innerHTML = '<span class="sending"><span class="spinner"></span> Enviando...</span>';

      const payload = {
        nome: nomeInput.value.trim(),
        email: emailInput.value.trim(),
        senha: senhaInput.value,
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          const mensagem = data.erro || 'Ocorreu um erro no cadastro. Tente novamente.';
          exibirStatus('error', mensagem);
        } else {
          exibirStatus('success', data.mensagem || 'Cadastro realizado com sucesso!');
          form.reset();
        }
      } catch (error) {
        exibirStatus('error', 'Não foi possível conectar ao servidor. Tente novamente mais tarde.');
        console.error('Erro de rede:', error);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Cadastrar';
      }
    });
  </script>
</body>
</html>
