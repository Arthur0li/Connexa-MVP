<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Connexa</title>
  <!-- TASK-039: Tela de atualização de perfil e gerenciamento de credenciais -->
  <style>
    :root {
      --primary: #007bff;
      --background: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --danger: #dc3545;
      --success: #198754;
      --border: #d1d5db;
      --radius: 1rem;
      font-family: Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f3f8ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text);
    }

    .container {
      width: min(760px, 100%);
      background: var(--background);
      border: 1px solid rgba(0, 123, 255, 0.14);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    .heading {
      margin: 0 0 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .heading h1 {
      font-size: clamp(1.9rem, 2.5vw, 2.5rem);
      color: var(--primary);
      margin: 0;
    }

    .heading p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .form-grid {
      display: grid;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    .form-group {
      display: grid;
      gap: 0.45rem;
    }

    label {
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0.85rem;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.12);
    }

    .hint {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .error-text {
      font-size: 0.95rem;
      color: var(--danger);
      min-height: 1.2em;
    }

    .status {
      margin-top: 1.25rem;
      border-radius: 0.95rem;
      padding: 1rem 1.1rem;
      font-size: 1rem;
      display: none;
    }

    .status.active {
      display: block;
    }

    .status.success {
      background: rgba(25, 135, 84, 0.12);
      border: 1px solid rgba(25, 135, 84, 0.2);
      color: var(--success);
    }

    .status.error {
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.2);
      color: var(--danger);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-top: 1.25rem;
    }

    button {
      border: none;
      border-radius: 0.9rem;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: #0056d6;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .profile-meta {
      display: grid;
      gap: 0.65rem;
      margin-bottom: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .profile-meta strong {
      color: var(--text);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 650px) {
      .container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="container" aria-labelledby="perfil-titulo">
    <div class="heading">
      <div>
        <h1 id="perfil-titulo">Editar perfil</h1>
        <p>Atualize suas informações pessoais e suas credenciais de acesso.</p>
      </div>
    </div>

    <div class="profile-meta">
      <span><strong>Usuário atual:</strong> <span id="usuario-email">carregando...</span></span>
      <span><strong>Cadastro:</strong> <span id="usuario-data">—</span></span>
    </div>

    <form id="perfil-form" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" autocomplete="name" required aria-describedby="nome-error" />
          <p class="error-text" id="nome-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" rows="4" aria-describedby="bio-error"></textarea>
          <p class="hint">Fale brevemente sobre você. Máximo 250 caracteres.</p>
          <p class="error-text" id="bio-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="foto">URL da Foto</label>
          <input id="foto" name="foto" type="url" autocomplete="url" aria-describedby="foto-error" />
          <p class="hint">Informe a URL de um avatar ou foto de perfil.</p>
          <p class="error-text" id="foto-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="novaSenha">Nova senha</label>
          <input id="novaSenha" name="novaSenha" type="password" autocomplete="new-password" aria-describedby="senha-error" />
          <p class="hint">Deixe em branco para manter a senha atual.</p>
        </div>

        <div class="form-group">
          <label for="confirmacaoSenha">Confirmação</label>
          <input id="confirmacaoSenha" name="confirmacaoSenha" type="password" autocomplete="new-password" aria-describedby="confirmacao-error" />
          <p class="error-text" id="confirmacao-error" aria-live="polite"></p>
        </div>
      </div>

      <div class="status" id="status" role="status" aria-live="polite"></div>

      <div class="actions">
        <button id="submit-button" type="submit">Salvar alterações</button>
      </div>
    </form>
  </main>

  <script>
    // TASK-039: frontend de edição de perfil de usuário
    const CURRENT_USER_ID = 1;
    const API_BASE = '/api/usuarios';

    const perfilForm = document.getElementById('perfil-form');
    const submitButton = document.getElementById('submit-button');
    const statusBox = document.getElementById('status');
    const usuarioEmail = document.getElementById('usuario-email');
    const usuarioData = document.getElementById('usuario-data');

    const inputs = {
      nome: document.getElementById('nome'),
      bio: document.getElementById('bio'),
      foto: document.getElementById('foto'),
      novaSenha: document.getElementById('novaSenha'),
      confirmacaoSenha: document.getElementById('confirmacaoSenha'),
    };

    const errors = {
      nome: document.getElementById('nome-error'),
      bio: document.getElementById('bio-error'),
      foto: document.getElementById('foto-error'),
      confirmacao: document.getElementById('confirmacao-error'),
    };

    function validaNome(valor) {
      return valor.trim().length >= 3;
    }

    function validaBio(valor) {
      return valor.length <= 250;
    }

    function validaFoto(valor) {
      if (!valor.trim()) return true;
      try {
        new URL(valor);
        return true;
      } catch (_) {
        return false;
      }
    }

    function validaSenhas(novaSenha, confirmacaoSenha) {
      if (!novaSenha && !confirmacaoSenha) return true;
      return novaSenha === confirmacaoSenha;
    }

    function validaCampo(nomeCampo) {
      const valor = inputs[nomeCampo].value;
      let valido = true;
      let mensagem = '';

      if (nomeCampo === 'nome') {
        valido = validaNome(valor);
        mensagem = 'Nome deve ter pelo menos 3 caracteres.';
      }

      if (nomeCampo === 'bio') {
        valido = validaBio(valor);
        mensagem = 'Bio deve ter no máximo 250 caracteres.';
      }

      if (nomeCampo === 'foto') {
        valido = validaFoto(valor);
        mensagem = 'URL de foto inválida.';
      }

      errors[nomeCampo].textContent = valido ? '' : mensagem;
      inputs[nomeCampo].setAttribute('aria-invalid', !valido);
      return valido;
    }

    function validaConfirmacaoSenha() {
      const novaSenha = inputs.novaSenha.value;
      const confirmacaoSenha = inputs.confirmacaoSenha.value;
      const valido = validaSenhas(novaSenha, confirmacaoSenha);
      errors.confirmacao.textContent = valido ? '' : 'As senhas não coincidem.';
      inputs.confirmacaoSenha.setAttribute('aria-invalid', !valido);
      return valido;
    }

    function exibirStatus(tipo, mensagem) {
      statusBox.className = `status active ${tipo}`;
      statusBox.textContent = mensagem;
    }

    function limparStatus() {
      statusBox.className = 'status';
      statusBox.textContent = '';
    }

    async function carregarPerfil() {
      try {
        const response = await fetch(`${API_BASE}/${CURRENT_USER_ID}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.erro || 'Não foi possível carregar os dados do perfil.');
        }

        const usuario = data.usuario;
        inputs.nome.value = usuario.nome || '';
        inputs.bio.value = usuario.bio || '';
        inputs.foto.value = usuario.foto || '';
        usuarioEmail.textContent = usuario.email || '—';
        usuarioData.textContent = usuario.data_criacao ? new Date(usuario.data_criacao).toLocaleDateString('pt-BR') : '—';
      } catch (error) {
        exibirStatus('error', error.message);
      }
    }

    inputs.nome.addEventListener('input', () => validaCampo('nome'));
    inputs.bio.addEventListener('input', () => validaCampo('bio'));
    inputs.foto.addEventListener('input', () => validaCampo('foto'));
    inputs.confirmacaoSenha.addEventListener('input', validaConfirmacaoSenha);
    inputs.novaSenha.addEventListener('input', () => {
      if (inputs.confirmacaoSenha.value.length > 0) {
        validaConfirmacaoSenha();
      }
    });

    perfilForm.addEventListener('submit', async event => {
      event.preventDefault();
      limparStatus();

      const camposValidos = validaCampo('nome') && validaCampo('bio') && validaCampo('foto') && validaConfirmacaoSenha();
      if (!camposValidos) {
        return exibirStatus('error', 'Corrija os campos inválidos antes de salvar.');
      }

      submitButton.disabled = true;
      submitButton.innerHTML = '<span class="loading"><span class="spinner"></span> Salvando...</span>';

      const payload = {
        nome: inputs.nome.value.trim(),
        bio: inputs.bio.value.trim(),
        foto: inputs.foto.value.trim(),
        novaSenha: inputs.novaSenha.value,
        confirmacaoSenha: inputs.confirmacaoSenha.value,
      };

      try {
        const response = await fetch(`${API_BASE}/${CURRENT_USER_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.erro || 'Não foi possível atualizar o perfil.');
        }

        exibirStatus('success', data.mensagem || 'Perfil atualizado com sucesso.');
        inputs.novaSenha.value = '';
        inputs.confirmacaoSenha.value = '';
      } catch (error) {
        exibirStatus('error', error.message);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Salvar alterações';
      }
    });

    carregarPerfil();
  </script>
</body>
</html>
